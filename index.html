<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibo AI - Auditor Comercial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 { font-size: 28px; font-weight: 700; }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover { background: #5568d3; }
        
        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 32px;
            background: #f9fafb;
        }
        
        .tab {
            padding: 16px 24px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
            padding: 32px;
        }
        
        .tab-content.active { display: block; }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .history-table th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .history-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .history-table tr:hover {
            background: #f9fafb;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .modal-header h2 { font-size: 24px; color: #111827; }
        
        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: #6b7280;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .close-modal:hover { background: #f3f4f6; color: #111827; }
        
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 32px;
            background: #f9fafb;
            position: sticky;
            top: 73px;
            z-index: 9;
        }
        
        .modal-tab {
            padding: 16px 24px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.2s;
        }
        
        .modal-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .modal-body {
            padding: 32px;
        }
        
        .modal-tab-content {
            display: none;
        }
        
        .modal-tab-content.active { display: block; }
        
        /* ANÁLISE - Header */
        .analise-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 12px;
            margin-bottom: 24px;
        }
        
        .analise-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }
        
        .analise-info h3 {
            font-size: 24px;
            color: #111827;
            margin-bottom: 4px;
        }
        
        .analise-info .subtitle {
            color: #6b7280;
            font-size: 14px;
        }
        
        .analise-score {
            margin-left: auto;
            text-align: center;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .score-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        /* Cards de informação */
        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .info-card {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: white;
        }
        
        .info-card-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .info-card-value {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
        }
        
        /* Etapas */
        .etapa {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        .etapa-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .etapa-header:hover { background: #f3f4f6; }
        
        .etapa-title {
            font-weight: 600;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .etapa-nota {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stars {
            color: #fbbf24;
            font-size: 18px;
        }
        
        .etapa-body {
            display: none;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }
        
        .etapa.expanded .etapa-body { display: block; }
        .etapa.expanded .etapa-header { background: #f3f4f6; }
        
        .subitem {
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            background: #f9fafb;
        }
        
        .subitem-title {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .subitem-text {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }
        
        /* Objeções */
        .objecao-item {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
            background: white;
        }
        
        .objecao-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .objecao-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .objecao-status.contornada { background: #d1fae5; color: #065f46; }
        .objecao-status.nao-contornada { background: #fee2e2; color: #991b1b; }
        
        .objecao-text {
            color: #111827;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .objecao-sugestao {
            background: #eff6ff;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #3b82f6;
            font-size: 14px;
            color: #1e40af;
        }
        
        /* Listas de pontos */
        .pontos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .pontos-section h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #111827;
        }
        
        .ponto-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .ponto-forte {
            background: #d1fae5;
            color: #065f46;
            border-left: 3px solid #10b981;
        }
        
        .ponto-atencao {
            background: #fef3c7;
            color: #92400e;
            border-left: 3px solid #f59e0b;
        }
        
        /* Plano de coaching */
        .coaching-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
        }
        
        .coaching-box h4 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #111827;
        }
        
        .coaching-box p {
            line-height: 1.8;
            color: #374151;
            white-space: pre-wrap;
        }
        
        /* SDR Tab */
        .sdr-veredicto {
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .sdr-veredicto.qualificado { background: #d1fae5; border: 2px solid #10b981; }
        .sdr-veredicto.parcial { background: #fef3c7; border: 2px solid #f59e0b; }
        .sdr-veredicto.mal-qualificado { background: #fee2e2; border: 2px solid #ef4444; }
        
        .sdr-veredicto h3 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .sdr-nota-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .sdr-nota-number {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sdr-nota-label {
            font-size: 14px;
            color: #6b7280;
        }
        
        .sdr-checklist {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .sdr-check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: white;
        }
        
        .check-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }
        
        .check-icon.ok { background: #d1fae5; color: #065f46; }
        .check-icon.nok { background: #fee2e2; color: #991b1b; }
        
        .check-content {
            flex: 1;
        }
        
        .check-label {
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }
        
        .check-evidence {
            font-size: 13px;
            color: #6b7280;
            font-style: italic;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .pontos-grid { grid-template-columns: 1fr; }
            .modal-content { margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Nibo AI - Auditor Comercial</h1>
            <div class="user-info" id="userInfo"></div>
        </header>
        
        <div class="tabs">
            <div class="tab active" data-tab="historico">📋 Histórico</div>
            <div class="tab" data-tab="dashboard">📊 Dashboard</div>
            <div class="tab" data-tab="config">⚙️ Configurações</div>
        </div>
        
        <div class="tab-content active" id="tab-historico">
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="window.location.reload()">🔄 Atualizar</button>
            </div>
            
            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Vendedor</th>
                        <th>Média</th>
                        <th>Produto</th>
                        <th>Veredicto SDR</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="tab-content" id="tab-dashboard">
            <p class="loading">Dashboard em desenvolvimento...</p>
        </div>
        
        <div class="tab-content" id="tab-config">
            <p class="loading">Configurações em desenvolvimento...</p>
        </div>
    </div>
    
    <!-- MODAL DE ANÁLISE DETALHADA -->
    <div class="modal" id="analiseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Análise Completa</h2>
                <span class="close-modal" onclick="fecharModal()">×</span>
            </div>
            
            <div class="modal-tabs">
                <div class="modal-tab active" data-modal-tab="auditoria">📈 Auditoria de Vendas</div>
                <div class="modal-tab" data-modal-tab="sdr">🎯 Qualificação do Lead (SDR)</div>
            </div>
            
            <div class="modal-body">
                <!-- Aba Auditoria -->
                <div class="modal-tab-content active" id="modal-tab-auditoria"></div>
                
                <!-- Aba SDR -->
                <div class="modal-tab-content" id="modal-tab-sdr"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let currentAnalise = null;
        
        // INICIALIZAÇÃO
        async function init() {
            await checkAuth();
            loadHistory();
            setupTabs();
            setupModalTabs();
        }
        
        async function checkAuth() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) {
                    window.location.href = '/api/auth';
                    return;
                }
                currentUser = await res.json();
                document.getElementById('userInfo').innerHTML = `
                    <img src="${currentUser.picture}" alt="${currentUser.name}">
                    <div>
                        <div style="font-weight: 600;">${currentUser.name}</div>
                        <div style="font-size: 12px; opacity: 0.9;">${currentUser.role === 'admin' ? '👑 Admin' : '👁️ Viewer'}</div>
                    </div>
                `;
            } catch (err) {
                console.error('Auth error:', err);
                window.location.href = '/api/auth';
            }
        }
        
        async function loadHistory() {
            try {
                const res = await fetch('/api/records?limit=100');
                const data = await res.json();
                renderHistory(data.records || []);
            } catch (err) {
                console.error('Load history error:', err);
            }
        }
        
        function renderHistory(records) {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = records.map(r => `
                <tr>
                    <td>${new Date(r.created_at).toLocaleDateString('pt-BR')}</td>
                    <td>${r.vendedor_nome}</td>
                    <td><strong>${r.media_final?.toFixed(1) || '-'}</strong></td>
                    <td>${r.produto || '-'}</td>
                    <td><span class="badge ${getBadgeClass(r.qual_veredicto)}">${r.qual_veredicto || 'Sem veredicto'}</span></td>
                    <td>
                        <button class="btn btn-secondary" onclick="verAnalise('${r.id}')">👁️ Ver Análise</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getBadgeClass(veredicto) {
            if (!veredicto) return 'badge-warning';
            const v = veredicto.toUpperCase();
            if (v.includes('QUALIFICADO') && !v.includes('MAL')) return 'badge-success';
            if (v.includes('PARCIAL')) return 'badge-warning';
            return 'badge-danger';
        }
        
        async function verAnalise(id) {
            try {
                const res = await fetch(`/api/records?id=${id}`);
                const data = await res.json();
                currentAnalise = data.record;
                renderAnaliseModal(currentAnalise);
                document.getElementById('analiseModal').classList.add('active');
            } catch (err) {
                console.error('Erro ao carregar análise:', err);
                alert('Erro ao carregar análise');
            }
        }
        
        function renderAnaliseModal(record) {
            const a = record.analise_json || {};
            
            // Renderiza Aba Auditoria
            document.getElementById('modal-tab-auditoria').innerHTML = `
                ${renderAnaliseHeader(record, a)}
                ${renderInfoCards(record, a)}
                ${renderDiagnostico(a)}
                ${renderEtapas(a)}
                ${renderObjecoes(a)}
                ${renderPontos(a)}
                ${renderCoaching(a)}
            `;
            
            // Renderiza Aba SDR
            document.getElementById('modal-tab-sdr').innerHTML = renderSdrTab(a);
        }
        
        function renderAnaliseHeader(record, a) {
            const iniciais = (record.vendedor_nome || 'NN').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            const performance = record.media_final >= 4 ? 'ALTA PERFORMANCE' : record.media_final >= 3 ? 'PERFORMANCE MÉDIA' : 'PRECISA MELHORAR';
            
            return `
                <div class="analise-header">
                    <div class="analise-avatar">${iniciais}</div>
                    <div class="analise-info">
                        <h3>${record.vendedor_nome}</h3>
                        <div class="subtitle">${performance}</div>
                        ${a.concorrentes_detectados?.length ? `<div class="subtitle">Concorrentes: ${a.concorrentes_detectados.join(', ')}</div>` : ''}
                    </div>
                    <div class="analise-score">
                        <div class="score-number">${record.media_final?.toFixed(1) || '-'}</div>
                        <div class="score-label">Média Global</div>
                    </div>
                </div>
            `;
        }
        
        function renderInfoCards(record, a) {
            return `
                <div class="info-cards">
                    <div class="info-card">
                        <div class="info-card-label">Probabilidade de Fechamento</div>
                        <div class="info-card-value">${a.chance_fechamento || 'Não avaliado'}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Alerta de Cancelamento</div>
                        <div class="info-card-value">${a.alerta_cancelamento || 'Sem alertas'}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Produto Demonstrado</div>
                        <div class="info-card-value">${a.qual_produto_identificado || record.produto || '-'}</div>
                    </div>
                </div>
            `;
        }
        
        function renderDiagnostico(a) {
            if (!a.resumo_executivo) return '';
            return `
                <div class="info-card" style="margin-bottom: 24px;">
                    <div class="info-card-label">Diagnóstico Geral</div>
                    <div class="info-card-value" style="font-size: 15px; font-weight: 400; line-height: 1.6; margin-top: 8px;">
                        ${a.resumo_executivo}
                    </div>
                </div>
            `;
        }
        
        function renderEtapas(a) {
            const etapas = [
                {
                    titulo: 'ETAPA 1 - Rapport & Comunicação',
                    nota: a.nota_etapa1 || a.nota_rapport,
                    porque: a.porque_etapa1,
                    melhoria: a.melhoria_etapa1,
                    subitens: [
                        { titulo: 'Rapport', nota: a.nota_rapport, porque: a.porque_rapport, melhoria: a.melhoria_rapport },
                        { titulo: 'Comunicação Eficaz', nota: a.nota_comunicacao, porque: a.porque_comunicacao, melhoria: a.melhoria_comunicacao }
                    ]
                },
                {
                    titulo: 'ETAPA 2 - SPIN Selling',
                    nota: a.nota_etapa_spin,
                    porque: a.porque_etapa_spin,
                    melhoria: a.melhoria_etapa_spin,
                    subitens: [
                        { titulo: 'Situação', nota: a.nota_spin_s, porque: a.porque_spin_s, melhoria: a.melhoria_spin_s },
                        { titulo: 'Problema', nota: a.nota_spin_p, porque: a.porque_spin_p, melhoria: a.melhoria_spin_p },
                        { titulo: 'Implicação', nota: a.nota_spin_i, porque: a.porque_spin_i, melhoria: a.melhoria_spin_i },
                        { titulo: 'Necessidade', nota: a.nota_spin_n, porque: a.porque_spin_n, melhoria: a.melhoria_spin_n }
                    ]
                },
                {
                    titulo: 'ETAPA 3 - Apresentação da Ferramenta',
                    nota: a.nota_etapa2 || a.nota_produto,
                    porque: a.porque_etapa2,
                    melhoria: a.melhoria_etapa2,
                    subitens: [
                        { titulo: 'Produto', nota: a.nota_produto, porque: a.porque_produto, melhoria: a.melhoria_produto },
                        { titulo: 'Objeções', nota: a.nota_objecoes, porque: a.porque_objecoes, melhoria: a.melhoria_objecoes },
                        { titulo: 'Solução da Dor', nota: a.nota_solucao_dor, porque: a.porque_solucao_dor, melhoria: a.melhoria_solucao_dor },
                        { titulo: 'Encantamento e Emoção', nota: a.nota_encantamento, porque: a.porque_encantamento, melhoria: a.melhoria_encantamento }
                    ]
                },
                {
                    titulo: 'ETAPA 4 - Negociação',
                    nota: a.nota_etapa3 || a.nota_apresentacao,
                    porque: a.porque_etapa3,
                    melhoria: a.melhoria_etapa3,
                    subitens: [
                        { titulo: 'Pré-Fechamento', nota: a.nota_pre_fechamento_sub, porque: a.porque_pre_fechamento_sub, melhoria: a.melhoria_pre_fechamento_sub },
                        { titulo: 'Escuta Ativa', nota: a.nota_escuta_ativa, porque: a.porque_escuta_ativa, melhoria: a.melhoria_escuta_ativa },
                        { titulo: 'Resiliência', nota: a.nota_resiliencia, porque: a.porque_resiliencia, melhoria: a.melhoria_resiliencia },
                        { titulo: 'Gestão do Tempo', nota: a.nota_gestao_tempo, porque: a.porque_gestao_tempo, melhoria: a.melhoria_gestao_tempo },
                        { titulo: 'Regras de Fechamento', nota: a.nota_regras_fechamento, porque: a.porque_regras_fechamento, melhoria: a.melhoria_regras_fechamento }
                    ]
                }
            ];
            
            return etapas.map(e => `
                <div class="etapa">
                    <div class="etapa-header" onclick="toggleEtapa(this)">
                        <div class="etapa-title">
                            ${e.titulo}
                        </div>
                        <div class="etapa-nota">
                            <span class="stars">${renderStars(e.nota)}</span>
                            <strong>${e.nota || '-'}</strong>
                        </div>
                    </div>
                    <div class="etapa-body">
                        ${e.porque ? `<div class="subitem-text" style="margin-bottom: 16px;"><strong>Justificativa:</strong> ${e.porque}</div>` : ''}
                        ${e.melhoria ? `<div class="subitem-text" style="margin-bottom: 16px; color: #f59e0b;"><strong>Melhoria:</strong> ${e.melhoria}</div>` : ''}
                        ${e.subitens.map(s => `
                            <div class="subitem">
                                <div class="subitem-title">
                                    <span>${s.titulo}</span>
                                    <span>${renderStars(s.nota)} <strong>${s.nota || '-'}</strong></span>
                                </div>
                                ${s.porque ? `<div class="subitem-text">${s.porque}</div>` : ''}
                                ${s.melhoria ? `<div class="subitem-text" style="color: #f59e0b; margin-top: 8px;"><strong>Para melhorar:</strong> ${s.melhoria}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function renderStars(nota) {
            if (!nota) return '☆☆☆☆☆';
            const filled = Math.round(nota);
            return '★'.repeat(filled) + '☆'.repeat(5 - filled);
        }
        
        function renderObjecoes(a) {
            if (!a.auditoria_objecoes || !a.auditoria_objecoes.length) return '';
            
            const contornadas = a.auditoria_objecoes.filter(o => o.contornada).length;
            const total = a.auditoria_objecoes.length;
            const taxa = total > 0 ? Math.round((contornadas / total) * 100) : 0;
            
            return `
                <div style="margin-top: 32px;">
                    <h4 style="font-size: 18px; margin-bottom: 16px;">🎯 Auditoria de Objeções</h4>
                    <div class="info-card" style="margin-bottom: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong style="font-size: 24px; color: ${taxa >= 50 ? '#10b981' : '#ef4444'};">${taxa}%</strong>
                                <span style="color: #6b7280; margin-left: 8px;">taxa de contorno</span>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: #10b981;">✓ ${contornadas} contornadas</div>
                                <div style="color: #ef4444;">✗ ${total - contornadas} perdidas</div>
                            </div>
                        </div>
                    </div>
                    ${a.auditoria_objecoes.map(o => `
                        <div class="objecao-item">
                            <div class="objecao-header">
                                <div class="objecao-status ${o.contornada ? 'contornada' : 'nao-contornada'}">
                                    ${o.contornada ? '✓' : '✗'}
                                </div>
                                <strong>${o.contornada ? 'CONTORNADA' : 'NÃO CONTORNADA'}</strong>
                            </div>
                            <div class="objecao-text">"${o.objecao}"</div>
                            ${!o.contornada && o.abordagem_sugerida ? `
                                <div class="objecao-sugestao">
                                    💡 <strong>Abordagem sugerida:</strong> ${o.abordagem_sugerida}
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderPontos(a) {
            const fortes = a.pontos_fortes || [];
            const atencao = a.pontos_atencao || [];
            
            if (!fortes.length && !atencao.length) return '';
            
            return `
                <div class="pontos-grid" style="margin-top: 32px;">
                    <div class="pontos-section">
                        <h4>✅ Pontos Fortes</h4>
                        ${fortes.map(p => `<div class="ponto-item ponto-forte">${p}</div>`).join('') || '<p style="color: #6b7280;">Nenhum ponto forte destacado</p>'}
                    </div>
                    <div class="pontos-section">
                        <h4>⚠️ Melhoria Imediata</h4>
                        ${atencao.map(p => `<div class="ponto-item ponto-atencao">${p}</div>`).join('') || '<p style="color: #6b7280;">Nenhum ponto de atenção</p>'}
                    </div>
                </div>
            `;
        }
        
        function renderCoaching(a) {
            if (!a.justificativa_detalhada) return '';
            return `
                <div class="coaching-box">
                    <h4>📋 Plano de Coaching</h4>
                    <p>${a.justificativa_detalhada}</p>
                </div>
            `;
        }
        
        function renderSdrTab(a) {
            const veredicto = (a.qual_veredicto || '').toUpperCase();
            let verdictoClass = 'parcial';
            if (veredicto.includes('QUALIFICADO') && !verdicto.includes('MAL')) verdictoClass = 'qualificado';
            if (verdicto.includes('MAL') || veredicto.includes('FORA')) verdictoClass = 'mal-qualificado';
            
            return `
                <div class="sdr-veredicto ${verdictoClass}">
                    <h3>${a.qual_veredicto || 'Sem veredicto'}</h3>
                </div>
                
                ${a.qual_produto_identificado ? `
                    <div class="info-card" style="margin-bottom: 24px;">
                        <div class="info-card-label">Produto Identificado</div>
                        <div class="info-card-value">${a.qual_produto_identificado}</div>
                        ${a.qual_produto_alerta ? `<div style="color: #ef4444; margin-top: 8px; font-size: 14px;">⚠️ ${a.qual_produto_alerta}</div>` : ''}
                    </div>
                ` : ''}
                
                <div class="sdr-nota-box">
                    <div class="sdr-nota-number">${a.qual_nota_sdr !== null && a.qual_nota_sdr !== undefined ? a.qual_nota_sdr : '-'}</div>
                    <div>
                        <div class="sdr-nota-label">Nota do SDR</div>
                        <div class="sdr-nota-label">(0 a 10)</div>
                    </div>
                </div>
                
                ${a.qual_nota_sdr_justificativa ? `
                    <div class="info-card" style="margin-bottom: 24px;">
                        <div class="info-card-label">Justificativa da Nota</div>
                        <div style="margin-top: 12px; line-height: 1.6; color: #374151;">${a.qual_nota_sdr_justificativa}</div>
                    </div>
                ` : ''}
                
                ${renderContextoExtraido(a)}
                ${renderCriteriosQualificacao(a)}
                ${renderSLAQualificacao(a)}
                
                ${a.qual_analise_completa ? `
                    <div class="coaching-box">
                        <h4>📊 Análise Completa da Qualificação</h4>
                        <p>${a.qual_analise_completa}</p>
                    </div>
                ` : ''}
                
                <div style="margin-top: 24px; text-align: center;">
                    <button class="btn btn-primary" onclick="gerarPDF()">📄 Gerar PDF</button>
                </div>
            `;
        }
        
        function renderContextoExtraido(a) {
            if (!a.qual_contexto || !a.qual_contexto.length) return '';
            return `
                <div class="sdr-checklist">
                    <h4 style="margin-bottom: 16px;">📋 Contexto Extraído</h4>
                    ${a.qual_contexto.map(c => `
                        <div class="sdr-check-item">
                            <div class="check-content">
                                <div class="check-label">${c.label}</div>
                                <div class="check-evidence">${c.valor || 'Não identificado'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderCriteriosQualificacao(a) {
            const criterios = [
                { label: 'Lead sabia o que veria na demo', ok: a.qual_sabia_o_que_veria, evidencia: a.qual_sabia_evidencia },
                { label: 'Produto correto para o cenário', ok: a.qual_produto_correto, evidencia: a.qual_produto_evidencia },
                { label: 'Interesse real identificado', ok: a.qual_interesse_real, evidencia: a.qual_interesse_evidencia },
                { label: 'Cenário diagnosticado pelo SDR', ok: a.qual_cenario_diagnosticado, evidencia: a.qual_cenario_evidencia }
            ];
            
            return `
                <div class="sdr-checklist">
                    <h4 style="margin-bottom: 16px;">✅ Critérios de Qualificação</h4>
                    ${criterios.map(c => `
                        <div class="sdr-check-item">
                            <div class="check-icon ${c.ok ? 'ok' : 'nok'}">${c.ok ? '✓' : '✗'}</div>
                            <div class="check-content">
                                <div class="check-label">${c.label}</div>
                                ${c.evidencia ? `<div class="check-evidence">"${c.evidencia}"</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderSLAQualificacao(a) {
            const slas = [
                { label: a.qual_sla_1_label || 'SLA 1', ok: a.qual_sla_1_ok, evidencia: a.qual_sla_1_ev },
                { label: a.qual_sla_2_label || 'SLA 2', ok: a.qual_sla_2_ok, evidencia: a.qual_sla_2_ev },
                { label: a.qual_sla_3_label || 'SLA 3', ok: a.qual_sla_3_ok, evidencia: a.qual_sla_3_ev }
            ];
            
            return `
                <div class="sdr-checklist">
                    <h4 style="margin-bottom: 16px;">⏱️ SLA de Qualificação</h4>
                    ${slas.map(s => `
                        <div class="sdr-check-item">
                            <div class="check-icon ${s.ok ? 'ok' : 'nok'}">${s.ok ? '✓' : '✗'}</div>
                            <div class="check-content">
                                <div class="check-label">${s.label}</div>
                                ${s.evidencia ? `<div class="check-evidence">"${s.evidencia}"</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function toggleEtapa(header) {
            const etapa = header.closest('.etapa');
            etapa.classList.toggle('expanded');
        }
        
        function fecharModal() {
            document.getElementById('analiseModal').classList.remove('active');
        }
        
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
                });
            });
        }
        
        function setupModalTabs() {
            document.querySelectorAll('.modal-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`modal-tab-${tab.dataset.modalTab}`).classList.add('active');
                });
            });
        }
        
        function gerarPDF() {
            alert('Funcionalidade de geração de PDF em desenvolvimento...');
            // TODO: Implementar geração de PDF com jsPDF ou similar
        }
        
        // Fecha modal ao clicar fora
        document.getElementById('analiseModal').addEventListener('click', (e) => {
            if (e.target.id === 'analiseModal') fecharModal();
        });
        
        // Inicializa ao carregar
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
