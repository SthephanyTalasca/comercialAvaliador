<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibo AI - Auditoria de Vendas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .markdown-content h1 { font-weight: 800; color: #1e3a8a; margin-top: 1.5rem; margin-bottom: 0.75rem; font-size: 1rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
        .markdown-content p { margin-bottom: 1rem; color: #475569; line-height: 1.6; font-size: 0.9rem; }
        .markdown-content ul { list-style-type: none; padding-left: 0; margin-bottom: 1.25rem; }
        .markdown-content li { position: relative; padding-left: 1.5rem; margin-bottom: 0.4rem; color: #475569; font-size: 0.85rem; }
        .markdown-content li::before { content: "•"; position: absolute; left: 0; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="pb-20 antialiased">

    <nav class="bg-[#002d72] text-white py-4 px-8 sticky top-0 z-50 shadow-xl border-b border-blue-400">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2.5 rounded-2xl shadow-inner">
                    <i data-lucide="shield-check" class="text-[#002d72] w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg uppercase tracking-tight">Nibo <span class="text-blue-400">Auditor Estratégico</span></h1>
                    <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-1">Substituição Acessórias & Fechamento</p>
                </div>
            </div>
            <input type="text" id="cc-name-input" placeholder="Consultor" class="pl-5 pr-5 py-2 rounded-xl bg-blue-900/40 border border-blue-400/50 text-white text-sm focus:outline-none focus:ring-2 ring-blue-300">
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <section class="mb-10">
            <div class="glass-card p-8">
                <textarea id="transcript-input" rows="5" class="w-full p-6 bg-slate-50 border border-slate-200 rounded-[2rem] focus:outline-none text-sm mb-6" placeholder="Cole a transcrição da reunião de substituição aqui..."></textarea>
                <div class="flex justify-end">
                    <button id="analyze-btn" class="flex items-center gap-3 bg-blue-600 hover:bg-[#002d72] text-white px-10 py-4 rounded-2xl font-bold text-sm shadow-xl transition-all">
                        <span>Auditar Estratégia de Venda</span>
                        <i data-lucide="zap" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </section>

        <div id="results-section" class="hidden space-y-8">
            <div id="loading-spinner" class="flex flex-col items-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Analisando substituição e gatilhos...</p>
            </div>

            <div id="analysis-content" class="hidden space-y-8 animate-in fade-in duration-1000">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="lg:col-span-1 glass-card p-10 flex flex-col items-center justify-center text-center border-b-[10px] border-blue-600">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Score de Fechamento</span>
                        <div id="media-final" class="text-7xl font-black text-[#002d72] mb-3">0.0</div>
                        <div id="status-tag" class="px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">---</div>
                    </div>
                    
                    <div class="lg:col-span-3 glass-card p-10 bg-gradient-to-br from-blue-700 to-blue-900 text-white flex flex-col justify-center">
                        <h3 class="font-bold text-blue-200 text-[10px] uppercase tracking-widest mb-4">Análise de Pontos Fortes</h3>
                        <p id="resumo-text" class="text-xl md:text-2xl font-bold leading-tight mb-8"></p>
                        <div class="p-4 bg-white/10 rounded-2xl border border-white/20">
                            <span class="text-[9px] font-black text-blue-300 uppercase block mb-1 tracking-widest">Oportunidade de Melhoria:</span>
                            <p id="chance-text" class="text-base font-bold text-white"></p>
                        </div>
                    </div>
                </div>

                <div id="notas-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="glass-card p-8 min-h-[350px] flex items-center justify-center">
                        <canvas id="radarChart"></canvas>
                    </div>
                    <div class="lg:col-span-2 glass-card p-10">
                        <h3 class="font-bold text-slate-800 text-lg mb-6 flex items-center gap-3">
                            <i data-lucide="scroll-text" class="text-blue-600"></i>
                            Relatório Técnico de Auditoria
                        </h3>
                        <div id="markdown-body" class="markdown-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const analyzeBtn = document.getElementById('analyze-btn');
        const transcriptInput = document.getElementById('transcript-input');
        const resultsSection = document.getElementById('results-section');
        const loadingSpinner = document.getElementById('loading-spinner');
        const analysisContent = document.getElementById('analysis-content');
        let radarChartInstance = null;

        analyzeBtn.addEventListener('click', async () => {
            const prompt = transcriptInput.value.trim();
            if(!prompt) return alert("Insira a transcrição.");
            
            resultsSection.classList.remove('hidden');
            loadingSpinner.classList.remove('hidden');
            analysisContent.classList.add('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                renderDashboard(data);
            } catch (err) {
                alert("Erro na análise.");
            }
        });

        function renderDashboard(data) {
            loadingSpinner.classList.add('hidden');
            analysisContent.classList.remove('hidden');

            // Média entre nota de substituição e fechamento
            const n1 = data.substituicao_acessorias.nota_tecnica || 0;
            const n2 = data.negociacao_fechamento.nota_final || 0;
            const media = (n1 + n2) / 2;
            
            document.getElementById('media-final').textContent = media.toFixed(1);
            document.getElementById('resumo-text').textContent = data.resumo_executivo.pontos_fortes;
            document.getElementById('chance-text').textContent = data.resumo_executivo.oportunidades_perdidas;

            const fields = [
                { l: 'Substituição', n: n1, p: "Ataque técnico à Acessórias" },
                { l: 'Negociação', n: n2, p: "Manejo de valores e sócios" },
                { l: 'Gatilhos', n: data.pre_fechamento.execucao_voto_confianca ? 5 : 1, p: "Voto de Confiança" }
            ];

            document.getElementById('notas-grid').innerHTML = fields.map(f => `
                <div class="glass-card p-6 text-center">
                    <span class="text-[9px] font-black text-slate-400 uppercase mb-3 block">${f.l}</span>
                    <div class="text-3xl font-black ${f.n >= 4 ? 'text-emerald-500' : 'text-blue-600'} mb-2">${f.n}</div>
                    <p class="text-[10px] text-slate-500">${f.p}</p>
                </div>
            `).join('');

            const mdText = `
# 🎯 Estratégia de Substituição
${data.substituicao_acessorias.diagnostico_estrategico}
**Ataque:** ${data.substituicao_acessorias.ataque_vulnerabilidades}

# 🚀 Pré-Fechamento
**Dores:** ${data.pre_fechamento.validacao_das_dores}
**Feedback:** ${data.pre_fechamento.coleta_de_feedback}

# 💸 Negociação Final
**Objeções:** ${data.negociacao_fechamento.manejo_de_objecoes}
**Gatilhos:** ${data.negociacao_fechamento.uso_de_gatilhos}

# 💡 Sugestão Prática
${data.resumo_executivo.sugestao_pratica}
            `;
            document.getElementById('markdown-body').innerHTML = marked.parse(mdText);

            renderRadar(data);
            lucide.createIcons();
        }

        function renderRadar(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Substituição', 'Pré-Fechamento', 'Negociação'],
                    datasets: [{
                        data: [
                            data.substituicao_acessorias.nota_tecnica,
                            data.pre_fechamento.execucao_voto_confianca ? 5 : 1,
                            data.negociacao_fechamento.nota_final
                        ],
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderColor: '#2563eb'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { r: { min: 0, max: 5 } } }
            });
        }
    </script>
</body>
</html>
